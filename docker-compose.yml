# Frontend: React + TypeScript (Vite). Backend: NestJS. Base de datos: Supabase (remoto).
# Sin PHP. Todo dockerizado.

services:
  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        VITE_API_URL: /api
    container_name: smart-economato-frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8081"
    restart: always
    ports:
      - "8081:8081"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_API_URL: "http://localhost:3000/api"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

  frontend_prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: smart-economato-frontend-prod
    restart: always
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  api:
    build:
      context: ./backend
      target: dev
    container_name: smart-economato-api
    command: sh -c "npm install && npm run start:dev"
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
