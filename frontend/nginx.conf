server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Redirigir rutas de la app antigua (menu.html, index.html, pages/*) a la app React
    location = /menu.html { return 302 /; }
    location ~ ^/pages/ { return 302 /; }

    # SPA: todas las rutas a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API al backend NestJS (contenedor api)
    location /api {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
