<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Economato Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        background: radial-gradient(circle at top, #f4efe7, #d7e2d2 55%, #bfcdb7);
        color: #213325;
      }

      main {
        max-width: 32rem;
        padding: 2rem;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 24px 60px rgba(33, 51, 37, 0.16);
        text-align: center;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 2rem;
      }

      p {
        margin: 0 0 0.75rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>La aplicación sigue disponible con la última información cacheada.</p>
      <p>Cuando vuelva la red, Smart Economato sincronizará los datos automáticamente.</p>
    </main>
  </body>
  </html>
