name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run build

backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # He eliminado 'cache-dependency-path' porque causaba el error de resolución.
          # Al poner 'cache: npm', GitHub buscará automáticamente el lockfile.
      
      - name: Debug - List files
        run: ls -R
      - run: npm ci
      - run: npm run type-check
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run test:e2e
      - run: npm run build  
